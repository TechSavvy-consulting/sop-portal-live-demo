<!doctype html><html lang="en"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>SOP Portal Login</title><link rel="stylesheet" href="styles.css"></head><body data-page="login"><div class="login-wrap"><section class="login-card"><img class="login-logo" data-brand-logo src="portal-logo.png" alt="Portal logo"><div class="eyebrow" id="loginBrandLabel">SOP Portal</div><h1>Sign in</h1><p class="small">Use your assigned SOP portal username and password.</p><div class="field"><label>Username</label><input id="username" autocomplete="username"></div><br><div class="field"><label>Password</label><input id="password" type="password" autocomplete="current-password"></div><br><button class="btn primary" id="loginBtn">Log in</button><p id="status" class="small"></p><a class="btn secondary" href="support.html">Need portal support?</a></section></div><script src="static-demo.js"></script><script src="brand.js"></script><script>async function login(){status.textContent='Signing in...';const r=await fetch('/api/login',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({username:username.value,password:password.value})});const d=await r.json().catch(()=>({}));if(!r.ok){status.textContent=d.error||'Login failed';return}const params=new URLSearchParams(location.search);location.href=params.get('return')||'./'}loginBtn.onclick=login;password.addEventListener('keydown',e=>{if(e.key==='Enter')login()});username.focus();</script></body></html>
